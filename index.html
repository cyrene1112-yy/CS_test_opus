<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Clone - Three.js</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#blocker {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#blocker .content {
  text-align: center; color: #fff;
}
#blocker h1 { font-size: 48px; margin-bottom: 16px; color: #f0c030; text-shadow: 2px 2px 4px #000; }
#blocker p { font-size: 18px; color: #ccc; }
#blocker .keys { margin-top: 20px; font-size: 14px; color: #999; line-height: 1.8; }
#name-input {
  display: block; margin: 16px auto 8px;
  padding: 10px 16px; font-size: 18px;
  background: rgba(255,255,255,0.1); border: 1px solid #666;
  color: #fff; text-align: center; outline: none; border-radius: 4px;
  width: 220px;
}
#name-input:focus { border-color: #f0c030; }
#play-btn {
  display: block; margin: 0 auto 8px;
  padding: 10px 40px; font-size: 18px; cursor: pointer;
  background: #f0c030; border: none; color: #000;
  font-weight: bold; border-radius: 4px;
  pointer-events: all;
}

/* HUD */
#hud {
  position: fixed; inset: 0; z-index: 10; pointer-events: none;
}

/* Crosshair */
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair .h, #crosshair .v {
  position: absolute; background: rgba(0, 255, 0, 0.9);
}
#crosshair .h {
  width: 20px; height: 2px; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair .v {
  width: 2px; height: 20px; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair .dot {
  position: absolute; width: 2px; height: 2px; background: rgba(0,255,0,0.9);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

/* Bottom HUD bar */
#hud-bottom {
  position: absolute; bottom: 20px; left: 0; right: 0;
  display: flex; justify-content: space-between; padding: 0 40px;
  font-size: 20px; color: #fff; text-shadow: 1px 1px 3px #000;
}
#hp-display { color: #4f4; }
#ammo-display { color: #ff4; }
#kill-display {
  position: absolute; top: 20px; right: 40px;
  font-size: 18px; color: #fff; text-shadow: 1px 1px 3px #000;
}

/* Damage flash */
#damage-flash {
  position: fixed; inset: 0; z-index: 9;
  background: rgba(255, 0, 0, 0); pointer-events: none;
  transition: background 0.05s;
}

/* Hit marker */
#hitmarker {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0; transition: opacity 0.1s;
}
#hitmarker .arm {
  position: absolute; background: #fff;
}
.hm-tl { width: 10px; height: 2px; transform: rotate(45deg); top: -6px; left: -12px; }
.hm-tr { width: 10px; height: 2px; transform: rotate(-45deg); top: -6px; left: 4px; }
.hm-bl { width: 10px; height: 2px; transform: rotate(-45deg); top: 6px; left: -12px; }
.hm-br { width: 10px; height: 2px; transform: rotate(45deg); top: 6px; left: 4px; }

/* Game over */
#gameover {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
}
#gameover h1 { color: #f33; font-size: 64px; margin-bottom: 20px; }
#gameover p { color: #ccc; font-size: 22px; margin-bottom: 30px; }
#gameover button {
  padding: 12px 40px; font-size: 20px; cursor: pointer;
  background: #f0c030; border: none; color: #000; font-weight: bold;
  pointer-events: all;
}

/* 死亡重生提示 */
#respawn-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; background: rgba(0,0,0,0.6); pointer-events: none;
}
#respawn-overlay.active { display: flex; }
#respawn-title { color: #f33; font-size: 52px; font-weight: bold; margin-bottom: 12px; }
#respawn-countdown { color: #ccc; font-size: 26px; }

/* Reload indicator */
#reload-bar-container {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 6px; background: rgba(0,0,0,0.5);
  border-radius: 3px; display: none;
}
#reload-bar {
  height: 100%; width: 0; background: #ff4; border-radius: 3px;
  transition: width 0.05s linear;
}

/* ───────────────────────────────────────
   地图选择界面 — 多边形 CS 风格
─────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

#map-select-screen {
  display: none;                /* 由 JS 控制显示 */
  position: fixed; inset: 0; z-index: 110;
  background: #06080a;
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  overflow-y: auto;
}

/* 扫描线背景纹理 */
#map-select-screen::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,80,0.02) 2px,
    rgba(0,255,80,0.02) 4px
  );
}

/* 顶部标题栏 */
.ms-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 48px 12px;
  border-bottom: 1px solid rgba(0,255,80,0.2);
  position: relative;
}
.ms-header::after {
  content: '';
  position: absolute; bottom: -3px; left: 48px; right: 48px;
  height: 1px; background: rgba(0,255,80,0.08);
}
.ms-logo {
  font-size: 28px; font-weight: 700; letter-spacing: 6px;
  color: #00ff50; text-shadow: 0 0 16px rgba(0,255,80,0.6);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  background: rgba(0,255,80,0.06); padding: 4px 20px;
}
.ms-subtitle {
  font-size: 13px; letter-spacing: 4px; color: #3a5c40;
  text-transform: uppercase;
}

/* 玩家名字区 */
.ms-player-row {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 48px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ms-player-label {
  font-size: 13px; letter-spacing: 3px; color: #3a5c40; text-transform: uppercase;
}
#ms-name-input {
  background: transparent;
  border: none; border-bottom: 2px solid rgba(0,255,80,0.4);
  color: #00ff50; font-family: inherit; font-size: 18px; font-weight: 700;
  letter-spacing: 2px; outline: none; width: 200px; padding: 4px 0;
}
#ms-name-input::placeholder { color: #2a4a30; }
#ms-name-input:focus { border-bottom-color: #00ff50; }

/* 地图列表区域 */
.ms-body {
  padding: 32px 48px;
}
.ms-section-title {
  font-size: 11px; letter-spacing: 5px; color: #3a5c40;
  text-transform: uppercase; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.ms-section-title::after {
  content: ''; flex: 1; height: 1px; background: rgba(0,255,80,0.12);
}

/* 地图卡片列表 */
.ms-map-list {
  display: flex; flex-direction: column; gap: 4px;
}

/* 单张地图条目 */
.ms-map-item {
  display: flex; align-items: center;
  padding: 0 24px;
  height: 72px;
  cursor: pointer;
  position: relative;
  background: rgba(255,255,255,0.02);
  /* 左上+右下斜切角，多边形感 */
  clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
  transition: background 0.15s, clip-path 0.15s;
  border-left: 3px solid transparent;
}
.ms-map-item::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: transparent;
  transition: background 0.15s;
}
.ms-map-item:hover {
  background: rgba(0,255,80,0.06);
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.ms-map-item:hover::before { background: #00ff50; }

/* 已选中的地图 */
.ms-map-item.selected {
  background: rgba(0,255,80,0.12);
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.ms-map-item.selected::before { background: #00ff50; }

/* 地图序号菱形 */
.ms-map-index {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,255,80,0.08);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  font-size: 13px; font-weight: 700; color: #3a8a50;
  margin-right: 20px; flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.ms-map-item:hover .ms-map-index,
.ms-map-item.selected .ms-map-index {
  background: rgba(0,255,80,0.25); color: #00ff50;
}

/* 地图名称+描述 */
.ms-map-info { flex: 1; }
.ms-map-name {
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  color: #c8d8cc; line-height: 1;
  transition: color 0.15s;
}
.ms-map-item:hover .ms-map-name,
.ms-map-item.selected .ms-map-name { color: #00ff50; }
.ms-map-desc {
  font-size: 12px; letter-spacing: 1px; color: #3a5c40;
  margin-top: 4px; line-height: 1;
}

/* 加载状态 */
.ms-map-loading {
  color: #2a4a30; font-size: 14px; letter-spacing: 3px;
  padding: 32px 0;
}

/* 底部进入按钮 */
.ms-footer {
  padding: 24px 48px 32px;
  display: flex; justify-content: flex-end; align-items: center; gap: 24px;
  border-top: 1px solid rgba(0,255,80,0.1);
}
.ms-selected-label {
  font-size: 13px; letter-spacing: 2px; color: #3a5c40;
}
.ms-selected-name {
  color: #00ff50; font-weight: 700;
}

/* 进入按钮 — 六边形多边形 */
#ms-enter-btn {
  padding: 14px 48px;
  background: #00ff50; color: #030a05;
  font-family: inherit; font-size: 16px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  border: none; cursor: pointer;
  clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
  transition: background 0.15s, transform 0.1s;
  pointer-events: all;
}
#ms-enter-btn:hover { background: #40ffaa; transform: scaleX(1.02); }
#ms-enter-btn:disabled {
  background: #1a2e20; color: #2a4a30; cursor: not-allowed; transform: none;
}

/* 装饰六边形（纯CSS，右下角） */
.ms-deco {
  position: fixed; right: -60px; bottom: -60px;
  width: 260px; height: 260px; pointer-events: none; opacity: 0.04;
  background: #00ff50;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
}
</style>
</head>
<body>

<!-- 第一步：输入名字 -->
<div id="blocker">
  <div class="content">
    <h1>CS CLONE</h1>
    <input id="name-input" type="text" maxlength="16" placeholder="输入你的名字" autocomplete="off" />
    <button id="play-btn">选择地图 →</button>
    <div class="keys">
      WASD - Move &nbsp;|&nbsp; Mouse - Look &nbsp;|&nbsp; Click - Shoot<br>
      Space - Jump &nbsp;|&nbsp; R - Reload &nbsp;|&nbsp; Shift - Sprint
    </div>
  </div>
</div>

<!-- 第二步：地图选择 -->
<div id="map-select-screen">
  <div class="ms-deco"></div>

  <!-- 顶部标题 -->
  <div class="ms-header">
    <div class="ms-logo">CS CLONE</div>
    <div class="ms-subtitle">Map Selection</div>
  </div>

  <!-- 玩家名字行 -->
  <div class="ms-player-row">
    <span class="ms-player-label">Player</span>
    <input id="ms-name-input" type="text" maxlength="16" placeholder="ANONYMOUS" autocomplete="off" />
  </div>

  <!-- 地图列表 -->
  <div class="ms-body">
    <div class="ms-section-title">Available Maps</div>
    <div class="ms-map-list" id="ms-map-list">
      <div class="ms-map-loading">// Loading maps...</div>
    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="ms-footer">
    <div class="ms-selected-label">
      Selected: <span class="ms-selected-name" id="ms-selected-label">—</span>
    </div>
    <button id="ms-enter-btn" disabled>ENTER MAP</button>
  </div>
</div>

<div id="hud">
  <div id="crosshair">
    <div class="h"></div>
    <div class="v"></div>
    <div class="dot"></div>
  </div>
  <div id="hitmarker">
    <div class="arm hm-tl"></div>
    <div class="arm hm-tr"></div>
    <div class="arm hm-bl"></div>
    <div class="arm hm-br"></div>
  </div>
  <div id="kill-display">Kills: 0</div>
  <div id="hud-bottom">
    <div id="hp-display">HP: 100</div>
    <div id="ammo-display">30 / 30</div>
  </div>
  <div id="reload-bar-container"><div id="reload-bar"></div></div>
</div>

<div id="respawn-overlay">
  <div id="respawn-title">YOU DIED</div>
  <div id="respawn-countdown">Respawning in 3...</div>
</div>

<div id="damage-flash"></div>

<div id="gameover">
  <h1>YOU DIED</h1>
  <p>Kills: <span id="final-kills">0</span></p>
  <button id="restart-btn">Play Again</button>
</div>

<script type="module">
// ─── 外部依赖 ───
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
import * as InstantCore from 'https://esm.sh/@instantdb/core';

// InstantDB App ID
const INSTANT_APP_ID = 'f633fd9a-3334-4703-9104-a3ceb3e488b5';

{

  // ─── Config ───
  const ARENA_SIZE = 50;
  const WALL_HEIGHT = 4;
  const PLAYER_HEIGHT = 1.7;
  const PLAYER_SPEED = 6;
  const SPRINT_MULT = 1.6;
  const JUMP_FORCE = 8;
  const GRAVITY = 20;
  const MOUSE_SENS = 0.002;
  const FIRE_RATE = 150;
  const MAG_SIZE = 30;
  const RELOAD_TIME = 2000;
  const HEADSHOT_MULT = 2.5;
  const BODY_DMG = 25;

  // ─── State ───
  let scene, camera, renderer, clock;
  let playerVelocityY = 0;
  let isOnGround = true;
  let playerHP = 100;
  let ammo = MAG_SIZE;
  let reserve = MAG_SIZE * 3;
  let kills = 0;
  let isReloading = false;
  let reloadStart = 0;
  let lastFireTime = 0;
  let isLocked = false;
  let gameOver = false;
  let viewModel = null;        // first-person gun group
  let vmRecoil = 0;            // current recoil offset (0 = rest)
  let vmBobPhase = 0;          // walk bob phase

  // ─── 多人状态 ───
  const peerMeshes = {};       // { [peerId]: { mesh, alive, deathTime } }
  const peerTargets = {};      // { [peerId]: { pos, ry, hp, alive } } 目标插值状态
  let myPeerId = null;         // 本地玩家 InstantDB peer ID
  let myName = 'Player';       // 本地玩家名字
  let room = null;             // InstantDB room handle
  let isDead = false;          // 本地玩家是否死亡
  let deaths = 0;              // 死亡次数
  let lastPresenceSync = 0;    // 上次 presence 同步时间戳（用于节流）
  let lastHitBy = null;        // 最后一次击中我的玩家 { peerId, name }

  const keys = {};
  const obstacles = [];
  const playerPos = new THREE.Vector3(0, PLAYER_HEIGHT, 0);
  const euler = new THREE.Euler(0, 0, 0, 'YXZ');
  const raycaster = new THREE.Raycaster();

  // ─── Audio (Chiptune style) ───
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // Helper: quick chiptune note
  function chipNote(freq, type, startTime, duration, volume) {
    const osc = audioCtx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.linearRampToValueAtTime(volume * 0.6, startTime + duration * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  // Helper: noise burst
  function chipNoise(startTime, duration, volume) {
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * duration), audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    // 1-bit style crunchy noise
    let val = 1;
    for (let i = 0; i < data.length; i++) {
      if (Math.random() < 0.15) val = -val;
      data[i] = val * Math.pow(1 - i / data.length, 2);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    src.connect(gain).connect(audioCtx.destination);
    src.start(startTime);
  }

  function playGunshot() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Attack: short square wave pitch sweep down (pew!)
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.07);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.1);
    // Crunchy noise tail
    chipNoise(t, 0.08, 0.14);
    // Low punch
    chipNote(80, 'square', t, 0.06, 0.12);
  }

  function playHitSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Short rising blip
    chipNote(300, 'square', t, 0.04, 0.10);
    chipNote(600, 'square', t + 0.03, 0.04, 0.08);
  }

  function playKillSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Triumphant chiptune arpeggio: C E G C'
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      chipNote(freq, 'square', t + i * 0.07, 0.12, 0.10);
    });
    // Parallel triangle wave for body
    chipNote(523, 'triangle', t, 0.35, 0.08);
    chipNote(784, 'triangle', t + 0.15, 0.20, 0.06);
  }

  function playDeathSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Descending chiptune death jingle
    const notes = [600, 500, 400, 200];
    notes.forEach((freq, i) => {
      chipNote(freq, 'square', t + i * 0.1, 0.12, 0.10);
    });
    // Low rumble
    chipNote(80, 'triangle', t, 0.5, 0.10);
    // Noise burst at end
    chipNoise(t + 0.3, 0.2, 0.08);
  }

  function playHeadshotSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Crispy high screech + ding
    chipNote(1200, 'square', t, 0.06, 0.10);
    chipNote(1600, 'square', t + 0.04, 0.08, 0.08);
    chipNoise(t, 0.05, 0.10);
  }

  function playDamageSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    chipNote(200, 'square', t, 0.08, 0.10);
    chipNote(150, 'square', t + 0.06, 0.10, 0.08);
  }

  // ─── Init Scene ───
  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.copy(playerPos);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 30, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -ARENA_SIZE;
    dirLight.shadow.camera.right = ARENA_SIZE;
    dirLight.shadow.camera.top = ARENA_SIZE;
    dirLight.shadow.camera.bottom = -ARENA_SIZE;
    scene.add(dirLight);

    clock = new THREE.Clock();

    buildMap();
    setupControls();
    createViewModel();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  // ─── Map ───
  function buildMap() {
    // Ground
    const groundGeo = new THREE.PlaneGeometry(ARENA_SIZE * 2, ARENA_SIZE * 2);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x888877 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Walls
    const wallMat = new THREE.MeshLambertMaterial({ color: 0x997755 });
    const wallConfigs = [
      { w: ARENA_SIZE * 2, h: WALL_HEIGHT, d: 1, x: 0, z: -ARENA_SIZE },
      { w: ARENA_SIZE * 2, h: WALL_HEIGHT, d: 1, x: 0, z: ARENA_SIZE },

  function triggerViewModelRecoil() {
    vmRecoil = 1.0; // start at full recoil
    // Flash the muzzle flash
    const flash = viewModel.getObjectByName('muzzleFlash');
    if (flash) {
      flash.material.opacity = 1;
      flash.scale.set(
        0.8 + Math.random() * 0.6,
        0.8 + Math.random() * 0.6,
        1
      );
      flash.rotation.z = Math.random() * Math.PI;
      setTimeout(() => { flash.material.opacity = 0; }, 40);
    }
  }

  function updateViewModel(dt, isMoving) {
    if (!viewModel) return;
    const rest = viewModel.userData.restPos;

    // Recoil: kick back and up, then spring back
    if (vmRecoil > 0) {
      vmRecoil = Math.max(0, vmRecoil - dt * 8);
    }
    const recoilZ = vmRecoil * 0.06;
    const recoilY = vmRecoil * 0.03;
    const recoilRotX = vmRecoil * -0.08;

    // Walk bob
    if (isMoving && isOnGround) {
      vmBobPhase += dt * 10;
    } else {
      // Gentle idle sway
      vmBobPhase += dt * 1.5;
    }
    const bobAmp = (isMoving && isOnGround) ? 1 : 0.15;
    const bobX = Math.sin(vmBobPhase) * 0.003 * bobAmp;
    const bobY = Math.abs(Math.sin(vmBobPhase * 2)) * 0.004 * bobAmp;

    viewModel.position.set(
      rest.x + bobX,
      rest.y + bobY + recoilY,
      rest.z + recoilZ
    );
    viewModel.rotation.set(
      recoilRotX,
      0,
      0
    );
  }

  function getRandomSpawnPos() {
    const margin = 5;
    for (let attempts = 0; attempts < 50; attempts++) {
      const x = (Math.random() - 0.5) * (ARENA_SIZE * 2 - margin * 2);
      const z = (Math.random() - 0.5) * (ARENA_SIZE * 2 - margin * 2);
      // Check not too close to player
      const dx = x - playerPos.x;
      const dz = z - playerPos.z;
      if (Math.sqrt(dx * dx + dz * dz) < 8) continue;
      // Check not inside obstacles
      let blocked = false;
      for (const obs of obstacles) {
        const bb = new THREE.Box3().setFromObject(obs).expandByScalar(1);
        if (bb.containsPoint(new THREE.Vector3(x, 1, z))) { blocked = true; break; }
      }
      if (!blocked) return new THREE.Vector3(x, 0, z);
    }
    return new THREE.Vector3(Math.random() * 10 - 5, 0, Math.random() * 10 - 5);
  }

  // 更新玩家头顶血条（多人模式复用）
  function updateEnemyHPBar(enemy) {
    const bar = enemy.mesh.getObjectByName('hpBar');
    if (bar) {
      const pct = Math.max(0, enemy.hp / 100);
      bar.scale.x = pct;
      bar.position.x = -(0.56 * (1 - pct)) / 2;
      if (pct > 0.5) bar.material.color.setHex(0x00ff00);
      else if (pct > 0.25) bar.material.color.setHex(0xffaa00);
      else bar.material.color.setHex(0xff0000);
    }
  }

  // ─── Controls ───
  function setupControls() {
    const blocker = document.getElementById('blocker');
    const mapSelectScreen = document.getElementById('map-select-screen');

    // ─── 地图选择页逻辑 ───

    let selectedMapId = null;    // 当前选中的地图 ID
    let selectedMapName = null;  // 当前选中的地图名称

    // 从 InstantDB 拉取地图列表（只读查询，无需登录）
    async function loadMaps() {
      const db = InstantCore.init({ appId: INSTANT_APP_ID });
      const listEl = document.getElementById('ms-map-list');

      // 订阅 maps 集合，实时更新
      db.subscribeQuery({ maps: {} }, ({ data, error }) => {
        if (error) {
          listEl.innerHTML = '<div class="ms-map-loading" style="color:#f33">// Failed to load maps</div>';
          return;
        }
        if (!data || !data.maps || data.maps.length === 0) {
          listEl.innerHTML = '<div class="ms-map-loading">// No maps found</div>';
          return;
        }

        // 按 createdAt 排序，渲染地图条目
        const sorted = [...data.maps].sort((a, b) => a.createdAt - b.createdAt);
        listEl.innerHTML = '';
        sorted.forEach((map, idx) => {
          const item = document.createElement('div');
          item.className = 'ms-map-item';
          item.dataset.mapId = map.id;
          item.dataset.mapName = map.name;
          item.innerHTML = `
            <div class="ms-map-index">${String(idx + 1).padStart(2, '0')}</div>
            <div class="ms-map-info">
              <div class="ms-map-name">${map.name}</div>
              <div class="ms-map-desc">${map.description}</div>
            </div>
          `;
          // 点击选中
          item.addEventListener('click', () => {
            document.querySelectorAll('.ms-map-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            selectedMapId = map.id;
            selectedMapName = map.name;
            document.getElementById('ms-selected-label').textContent = map.name;
            document.getElementById('ms-enter-btn').disabled = false;
          });
          listEl.appendChild(item);
        });
      });
    }

    // 第一步：输入名字 → 进入地图选择页
    document.getElementById('play-btn').addEventListener('click', () => {
      const input = document.getElementById('name-input').value.trim();
      const resolvedName = input || ('Player' + Math.floor(Math.random() * 1000));
      myName = resolvedName;

      // 把名字同步到地图选择页输入框
      document.getElementById('ms-name-input').value = resolvedName;

      // 隐藏初始界面，显示地图选择页
      blocker.style.display = 'none';
      mapSelectScreen.style.display = 'block';

      // 拉取地图
      loadMaps();
    });

    // Enter 键触发进入地图选择页
    document.getElementById('name-input').addEventListener('keydown', (e) => {
      if (e.code === 'Enter') document.getElementById('play-btn').click();
    });

    // 地图选择页：名字输入框同步（允许用户在此修改名字）
    document.getElementById('ms-name-input').addEventListener('input', (e) => {
      const v = e.target.value.trim();
      if (v) myName = v;
    });

    // 第二步：选好地图后点击进入
    document.getElementById('ms-enter-btn').addEventListener('click', () => {
      if (!selectedMapId) return;

      // 从地图选择页读取最终名字
      const finalName = document.getElementById('ms-name-input').value.trim();
      if (finalName) myName = finalName;

      // 隐藏地图选择页，进入游戏
      mapSelectScreen.style.display = 'none';

      gameStarted = true;
      initAudio();
      initMultiplayer(selectedMapId);        // 传入地图 ID 作为房间标识
      renderer.domElement.requestPointerLock();
    });

    // 标记游戏是否已经开始（进入游戏后 blocker 不再是初始界面）
    let gameStarted = false;

    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === renderer.domElement;
      if (!isLocked) {
        // 游戏进行中按 Esc：显示"点击继续"提示，而非名字输入界面
        if (gameStarted) {
          blocker.querySelector('.content').innerHTML =
            '<h1>CS CLONE</h1><p style="color:#ccc;font-size:18px">Click to continue</p>';
        }
        blocker.style.display = 'flex';
      }
    });

    // 游戏中点击 blocker 重新锁定
    blocker.addEventListener('click', (e) => {
      if (gameStarted && !isLocked) {
        renderer.domElement.requestPointerLock();
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (!isLocked || isDead) return;
      euler.y -= e.movementX * MOUSE_SENS;
      euler.x -= e.movementY * MOUSE_SENS;
      euler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, euler.x));
      camera.quaternion.setFromEuler(euler);
    });

    document.addEventListener('mousedown', (e) => {
      if (!isLocked || isDead) return;
      if (e.button === 0) shoot();
    });

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'KeyR' && !isReloading && ammo < MAG_SIZE) startReload();
    });
    document.addEventListener('keyup', (e) => { keys[e.code] = false; });
  }

  // ─── 多人：初始化 InstantDB 房间 ───
  // mapId：使用地图的数据库 ID 作为 presence 房间标识，同一地图的玩家共享同一房间
  function initMultiplayer(mapId) {
    const db = InstantCore.init({ appId: INSTANT_APP_ID });
    // 用地图 ID 作为房间标识，不同地图的玩家互不干扰
    room = db.joinRoom('game', mapId);

    // 订阅 presence：感知同房间内所有玩家的状态变化
    room.subscribePresence({}, (response) => {
      if (response.isLoading) return;

      // 记录自己的 peerId（首次获取）
      if (response.user) myPeerId = response.user.peerId;

      const currentIds = new Set(Object.keys(response.peers));
      const trackedIds = new Set(Object.keys(peerMeshes));

      // 新加入的玩家：创建 mesh 并加入场景
      for (const [peerId, peer] of Object.entries(response.peers)) {
        if (!peerMeshes[peerId]) {
          const mesh = createEnemyMesh();
          const spawnPos = getRandomSpawnPos();
          mesh.position.set(spawnPos.x, 0, spawnPos.z);
          scene.add(mesh);
          peerMeshes[peerId] = { mesh, alive: true, deathTime: 0 };
        }
        // 更新插值目标
        peerTargets[peerId] = {
          pos: new THREE.Vector3(peer.x ?? 0, (peer.y ?? PLAYER_HEIGHT) - PLAYER_HEIGHT, peer.z ?? 0),
          ry:  peer.ry  ?? 0,
          hp:  peer.hp  ?? 100,
          alive: peer.alive !== false,
        };
      }

      // 离开的玩家：从场景移除
      for (const peerId of trackedIds) {
        if (!currentIds.has(peerId)) {
          scene.remove(peerMeshes[peerId].mesh);
          delete peerMeshes[peerId];
          delete peerTargets[peerId];
        }
      }
    });

    // 订阅 hit topic：收到命中事件后自己扣血
    room.subscribeTopic('hit', (event) => {
      // myPeerId 可能尚未初始化（presence 未到），此时跳过而不是误判
      if (!myPeerId || event.targetId !== myPeerId) return;
      if (isDead) return;
      // 记录击中我的玩家，用于死亡时发 kill 事件（使用事件中携带的数据，不依赖 senderPresence）
      lastHitBy = { peerId: event.shooterId || null, name: event.shooterName || 'Unknown' };
      damagePlayer(event.damage);
    });

    // 订阅 kill topic：用于更新击杀数和显示
    room.subscribeTopic('kill', (event) => {
      // 如果我是击杀者，增加 kills 计数
      if (event.killerPeerId === myPeerId) {
        kills++;
        updateKillDisplay();
        playKillSound();
      }
    });
  }

  // ─── 多人：每帧更新远端玩家 mesh（插值 + 血条 + 死亡动画）───
  function updatePeers(dt) {
    for (const [peerId, peer] of Object.entries(peerMeshes)) {
      const target = peerTargets[peerId];
      if (!target) continue;

      // 检测存活状态变化
      const justDied    = peer.alive && !target.alive;
      const justRespawn = !peer.alive && target.alive;

      if (justDied) {
        // 开始死亡动画
        peer.alive = false;
        peer.deathTime = performance.now();
      }

      if (justRespawn) {
        // 重生：瞬间移至新位置，重置 mesh
        peer.alive = true;
        peer.mesh.visible = true;
        peer.mesh.rotation.set(0, target.ry, 0);
        peer.mesh.position.copy(target.pos);
        peer.mesh.traverse(child => {
          if (child.isMesh) { child.material.transparent = false; child.material.opacity = 1; }
        });
      }

      if (peer.alive) {
        // 位置朝向插值（平滑移动）
        peer.mesh.position.lerp(target.pos, Math.min(dt * 15, 1));
        // 水平朝向插值
        let diff = target.ry - peer.mesh.rotation.y;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        peer.mesh.rotation.y += diff * Math.min(dt * 15, 1);

        // 血条面向摄像机
        const hpBar = peer.mesh.getObjectByName('hpBar');
        const hpBg  = peer.mesh.getObjectByName('hpBg');
        if (hpBar) hpBar.lookAt(camera.position);
        if (hpBg)  hpBg.lookAt(camera.position);

        // 更新血条百分比
        updateEnemyHPBar({ mesh: peer.mesh, hp: target.hp });
      } else {
        // 死亡动画：倒下并淡出
        const elapsed = performance.now() - peer.deathTime;
        const t = Math.min(elapsed / 1000, 1);
        peer.mesh.rotation.x = t * (Math.PI / 2);
        if (elapsed > 500) {
          const opacity = 1 - (elapsed - 500) / 500;
          peer.mesh.traverse(child => {
            if (child.isMesh) { child.material.transparent = true; child.material.opacity = Math.max(0, opacity); }
          });
        }
        if (elapsed > 1000) peer.mesh.visible = false;
      }
    }
  }

  // ─── 多人：同步本地玩家状态（50ms 节流）───
  function syncPresence() {
    if (!room) return;
    const now = performance.now();
    if (now - lastPresenceSync < 50) return;
    lastPresenceSync = now;

    // 发布本地玩家的位置、朝向、血量、存活状态
    room.publishPresence({
      name:  myName,
      x:     playerPos.x,
      y:     playerPos.y,
      z:     playerPos.z,
      ry:    euler.y,   // 水平朝向（用于远端玩家旋转）
      hp:    playerHP,
      alive: !isDead,
    });
  }

  // ─── Shooting ───
  function shoot() {
    if (isDead || isReloading) return;
    const now = performance.now();
    if (now - lastFireTime < FIRE_RATE) return;
    if (ammo <= 0) { startReload(); return; }

    lastFireTime = now;
    ammo--;
    updateAmmoDisplay();
    playGunshot();
    createMuzzleFlash();
    triggerViewModelRecoil();

    // ── Raycast 检测是否命中远端玩家 ──
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

    // 收集所有存活的远端玩家 mesh 子元素
    const meshes = [];
    for (const peer of Object.values(peerMeshes)) {
      if (peer.alive) peer.mesh.traverse(child => { if (child.isMesh) meshes.push(child); });
    }

    const hits = raycaster.intersectObjects(meshes);
    if (hits.length > 0) {
      const hit = hits[0];

      // 找出被击中的是哪个 peer
      let hitPeerId = null;
      let isHeadshot = false;
      for (const [peerId, peer] of Object.entries(peerMeshes)) {
        if (!peer.alive) continue;
        let found = false;
        peer.mesh.traverse(child => { if (child === hit.object) found = true; });
        if (found) {
          hitPeerId = peerId;
          // 判断是否爆头
          const headGroup = peer.mesh.getObjectByName('head');
          if (headGroup) headGroup.traverse(child => { if (child === hit.object) isHeadshot = true; });
          break;
        }
      }

      if (hitPeerId) {
        const dmg = isHeadshot ? Math.round(BODY_DMG * HEADSHOT_MULT) : BODY_DMG;
        // 本地反馈
        playHitSound();
        if (isHeadshot) playHeadshotSound();
        showHitmarker();
        createBloodEffect(hit.point);
        // 通知目标扣血，附带自己的 peerId 和名字（避免依赖 senderPresence）
        room.publishTopic('hit', { targetId: hitPeerId, damage: dmg, isHeadshot, shooterId: myPeerId, shooterName: myName });
      }
    }

    // Auto reload when empty
    if (ammo <= 0 && reserve > 0) setTimeout(() => { if (ammo <= 0) startReload(); }, 300);
  }

  function createMuzzleFlash() {
    const flash = new THREE.PointLight(0xffaa00, 3, 5);
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    flash.position.copy(camera.position).add(forward.multiplyScalar(0.5));
    flash.position.y -= 0.1;
    scene.add(flash);
    setTimeout(() => scene.remove(flash), 50);
  }

  function createBloodEffect(point) {
    const particles = new THREE.Group();
    for (let i = 0; i < 6; i++) {
      const geo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
      const mat = new THREE.MeshBasicMaterial({ color: 0xff2200 });
      const p = new THREE.Mesh(geo, mat);
      p.position.copy(point);
      p.userData.vel = new THREE.Vector3(
        (Math.random() - 0.5) * 3,
        Math.random() * 2,
        (Math.random() - 0.5) * 3
      );
      particles.add(p);
    }
    scene.add(particles);
    const start = performance.now();
    function animateBlood() {
      const elapsed = (performance.now() - start) / 1000;
      if (elapsed > 0.5) { scene.remove(particles); return; }
      particles.children.forEach(p => {
        p.position.add(p.userData.vel.clone().multiplyScalar(0.016));
        p.userData.vel.y -= 10 * 0.016;
      });
      requestAnimationFrame(animateBlood);
    }
    animateBlood();
  }

  function showHitmarker() {
    const hm = document.getElementById('hitmarker');
    hm.style.opacity = '1';
    setTimeout(() => hm.style.opacity = '0', 100);
  }

  function startReload() {
    if (isReloading || ammo === MAG_SIZE) return;
    isReloading = true;
    reloadStart = performance.now();
    document.getElementById('reload-bar-container').style.display = 'block';
  }

  function updateReload() {
    if (!isReloading) return;
    const elapsed = performance.now() - reloadStart;
    const pct = Math.min(elapsed / RELOAD_TIME, 1);
    document.getElementById('reload-bar').style.width = (pct * 100) + '%';
    if (pct >= 1) {
      const need = MAG_SIZE - ammo;
      const give = Math.min(need, reserve);
      ammo += give;
      reserve -= give;
      isReloading = false;
      document.getElementById('reload-bar-container').style.display = 'none';
      updateAmmoDisplay();
    }
  }

  // 显示击杀数 / 死亡数
  function updateKillDisplay() {
    document.getElementById('kill-display').textContent = `K: ${kills}  D: ${deaths}`;
  }

  function updateAmmoDisplay() {
    document.getElementById('ammo-display').textContent = ammo + ' / ' + reserve;
  }

  function updateHPDisplay() {
    document.getElementById('hp-display').textContent = 'HP: ' + Math.max(0, Math.round(playerHP));
  }

  // ─── Player collision ───
  function collidesWithObstacles(pos, radius) {
    const playerBox = new THREE.Box3(
      new THREE.Vector3(pos.x - radius, 0, pos.z - radius),
      new THREE.Vector3(pos.x + radius, PLAYER_HEIGHT + 0.3, pos.z + radius)
    );
    for (const obs of obstacles) {
      const obsBox = new THREE.Box3().setFromObject(obs);
      if (playerBox.intersectsBox(obsBox)) return true;
    }
    return false;
  }

  // ─── Enemy AI ───
  // 受到伤害：扣血，死亡时触发重生流程
  function damagePlayer(dmg) {
    if (isDead) return;
    playerHP -= dmg;
    updateHPDisplay();
    playDamageSound();

    // 红色闪烁
    const flash = document.getElementById('damage-flash');
    flash.style.background = 'rgba(255, 0, 0, 0.3)';
    setTimeout(() => flash.style.background = 'rgba(255, 0, 0, 0)', 150);

    if (playerHP <= 0) {
      playerHP = 0;
      updateHPDisplay();
      triggerDeath();
    }
  }

  // 死亡：通知其他玩家，显示倒计时，3 秒后重生
  function triggerDeath() {
    isDead = true;
    deaths++;
    playDeathSound();
    updateKillDisplay();

    // 通知所有人我被击杀（含击杀者 peerId，用于对方计分）
    if (room && lastHitBy) {
      room.publishTopic('kill', { killerPeerId: lastHitBy.peerId });
    }

    // 立即同步 alive=false
    syncPresence();

    // 显示重生倒计时
    const overlay = document.getElementById('respawn-overlay');
    const countdown = document.getElementById('respawn-countdown');
    overlay.classList.add('active');
    let sec = 3;
    countdown.textContent = `Respawning in ${sec}...`;
    const timer = setInterval(() => {
      sec--;
      if (sec > 0) {
        countdown.textContent = `Respawning in ${sec}...`;
      } else {
        clearInterval(timer);
        overlay.classList.remove('active');
        respawnPlayer();
      }
    }, 1000);
  }

  // 重生：重置状态，随机位置出生
  function respawnPlayer() {
    const spawnPos = getRandomSpawnPos();
    playerPos.set(spawnPos.x, PLAYER_HEIGHT, spawnPos.z);
    playerVelocityY = 0;
    isOnGround = true;
    playerHP = 100;
    ammo = MAG_SIZE;
    reserve = MAG_SIZE * 3;
    isReloading = false;
    isDead = false;
    lastHitBy = null;

    updateHPDisplay();
    updateAmmoDisplay();
    syncPresence(); // 立即广播 alive=true
  }

  // 兼容旧 restartGame 引用
  function restartGame() {
  }

  // ─── Game Loop ───
  function update() {
    if (isDead) { renderer.render(scene, camera); requestAnimationFrame(update); return; }
    const dt = Math.min(clock.getDelta(), 0.05);

    // Player movement
    if (isLocked) {
      const forward = new THREE.Vector3(0, 0, -1);
      forward.applyQuaternion(camera.quaternion);
      forward.y = 0;
      forward.normalize();

      const right = new THREE.Vector3(1, 0, 0);
      right.applyQuaternion(camera.quaternion);
      right.y = 0;
      right.normalize();

      let speed = PLAYER_SPEED;
      if (keys['ShiftLeft'] || keys['ShiftRight']) speed *= SPRINT_MULT;

      const move = new THREE.Vector3();
      if (keys['KeyW']) move.add(forward);
      if (keys['KeyS']) move.sub(forward);
      if (keys['KeyD']) move.add(right);
      if (keys['KeyA']) move.sub(right);

      if (move.length() > 0) {
        move.normalize().multiplyScalar(speed * dt);

        // Try X
        const testX = playerPos.clone();
        testX.x += move.x;
        if (!collidesWithObstacles(testX, 0.3) &&
            Math.abs(testX.x) < ARENA_SIZE - 0.5) {
          playerPos.x = testX.x;
        }

        // Try Z
        const testZ = playerPos.clone();
        testZ.z += move.z;
        if (!collidesWithObstacles(testZ, 0.3) &&
            Math.abs(testZ.z) < ARENA_SIZE - 0.5) {
          playerPos.z = testZ.z;
        }
      }

      // Jump
      if (keys['Space'] && isOnGround) {
        playerVelocityY = JUMP_FORCE;
        isOnGround = false;
      }

      // Gravity
      playerVelocityY -= GRAVITY * dt;
      playerPos.y += playerVelocityY * dt;
      if (playerPos.y <= PLAYER_HEIGHT) {
        playerPos.y = PLAYER_HEIGHT;
        playerVelocityY = 0;
        isOnGround = true;
      }

      camera.position.copy(playerPos);
    }

    updateReload();
    syncPresence();
    updatePeers(dt);

    // Update viewmodel (check if player is moving)
    const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];
    updateViewModel(dt, isMoving);

    renderer.render(scene, camera);
    requestAnimationFrame(update);
  }

  // ─── Start ───
  init();
  update();

}
</script>
</body>
</html>
